# cargo-deny configuration.
# https://embarkstudios.github.io/cargo-deny/checks/cfg.html

[graph]
all-features = false

[advisories]
version = 2
yanked = "warn"
ignore = [
    # RUSTSEC-2025-0141 — "bincode is unmaintained".
    # The bincode team stopped development after a harassment incident;
    # they consider 1.3.3 a complete release and 2.x is API-stable. Used
    # here only for in-process IPC framing (engine subprocess, #348)
    # where both ends ship from the same workspace, so version drift
    # isn't a risk. Re-evaluate when a like-for-like replacement
    # (postcard 2.x, wincode, …) becomes drop-in without pulling its
    # own unmaintained tail.
    "RUSTSEC-2025-0141",
]

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    "OpenSSL",
]

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Intra-workspace path deps (`ttymap-engine = { path = ".." }`) read as
# wildcards but are not real version-spec wildcards.
allow-wildcard-paths = true
deny = [
    # Don't ship two copies of TLS stacks in one binary.
    { name = "openssl", deny-multiple-versions = true },
    { name = "openssl-sys", deny-multiple-versions = true },
    { name = "rustls", deny-multiple-versions = true },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
