# ttymap configuration
# Place this file at ~/.config/ttymap/config.toml

# Tile source URL
# source = "http://mapscii.me/"

# Map label language (e.g. "en", "ja", "de")
# language = "en"

# Initial position (latitude, longitude)
# lat = 35.6828
# lon = 139.7595

# Initial zoom level
# zoom = 10.0

# Zoom step per keypress (default: 0.2)
# zoom_step = 0.3

# Maximum zoom level (default: 18.0)
# max_zoom = 18.0

# Enable disk tile cache (default: true)
# cache_tiles = true

# Style preset ("dark" or "bright")
# style = "dark"

# Jump to IP-based current location on startup (default: false)
# Can also be triggered per-run with the --here CLI flag.
# here_on_startup = true

# IP geolocation endpoint (default: "https://ipapi.co/json/")
# Must return JSON with numeric "latitude" / "longitude" fields.
# geoip_endpoint = "https://ipapi.co/json/"

# Timeout for the IP geolocation request in milliseconds (default: 2000)
# geoip_timeout_ms = 2000

# Key bindings
# Notation: "h" (character), "Left" (special key), "C-d" (Ctrl+d)
# Special keys: Left, Right, Up, Down, Enter, Esc, Tab
#
# [keymap]
# pan_left = ["h", "Left"]
# pan_right = ["l", "Right"]
# pan_up = ["k", "Up"]
# pan_down = ["j", "Down"]
# pan_left_fast = ["b"]
# pan_right_fast = ["w"]
# pan_up_half = ["C-u"]
# pan_down_half = ["C-d"]
# zoom_in = ["a", "+"]
# zoom_out = ["z", "-"]
# zoom_to_world = ["gg"]
# reset_position = ["0"]
# quit = ["q"]
