# ttymap configuration
# Place this file at ~/.config/ttymap/config.toml
#
# Every field is optional. Omitted sections and omitted fields
# fall back to the defaults shown below.
#
# Per-plugin knobs (refresh interval, panel size, hardcoded URLs)
# live inside each Lua script under src/lua/scripts/ for bundled
# plugins, and inside ~/.config/ttymap/plugins/<name>.lua for user
# plugins. There is no [<name>] enabled = false TOML gate — disable
# a plugin by setting `enabled = false` in the script's returned
# table (user plugins) or by removing the script (bundled).

# ── Initial view ────────────────────────────────────────────────────
# [map]
# lat = 35.6828
# lon = 139.7595
# zoom = 10.0
# max_zoom = 18.0
# zoom_step = 0.2

# ── Rendering ───────────────────────────────────────────────────────
# [render]
# style = "dark"       # "dark" or "bright"
# language = "en"      # map label language, e.g. "en", "ja", "de"

# ── Tile cache ──────────────────────────────────────────────────────
# [cache]
# tiles = true         # write decoded tiles to ~/.cache/ttymap/
# memory_tiles = 512   # LRU capacity for decoded tiles in memory

# ── IP-based geolocation ────────────────────────────────────────────
# Shared by the `--here` startup flag and the `here` Lua plugin.
# [geoip]
# on_startup = false
# endpoint = "https://ipapi.co/json/"   # must return JSON with numeric "latitude" / "longitude"
# timeout_ms = 2000

# ── Key bindings ────────────────────────────────────────────────────
# Notation: "h" (character), "Left" (special key), "C-d" (Ctrl+d)
# Special keys: Left, Right, Up, Down, Enter, Esc, Tab
#
# [keymap]
# pan_left = ["h", "Left"]
# pan_right = ["l", "Right"]
# pan_up = ["k", "Up"]
# pan_down = ["j", "Down"]
# pan_left_fast = ["b"]
# pan_right_fast = ["w"]
# pan_up_half = ["C-u"]
# pan_down_half = ["C-d"]
# zoom_in = ["a", "+"]
# zoom_out = ["z", "-"]
# zoom_to_world = ["gg"]
# reset_position = ["0"]
# quit = ["q"]
