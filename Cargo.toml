[package]
name = "ttymap"
version = "0.1.0"
edition = "2024"

[dependencies]
crossterm = "0.28"
ratatui = "0.30"
clap = { version = "4", features = ["derive"] }
reqwest = { version = "0.12", features = ["blocking", "json"] }
flate2 = "1"
prost = "0.14"
rstar = "0.12"
earcut = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
directories = "6"
unicode-width = "0.2"
log = { version = "0.4", features = ["std"] }
chrono = { version = "0.4", default-features = false, features = ["clock"] }
toml = "1.1.2"
indexmap = "2.14.0"

[dev-dependencies]
criterion = "0.5"

[dev-dependencies.cargo-husky]
version = "1"
default-features = false
features = ["precommit-hook", "run-cargo-test", "run-cargo-clippy", "run-cargo-fmt"]

[build-dependencies]
prost-build = "0.14"
protox = "0.9"

[[bench]]
name = "decode_tile"
harness = false

[[bench]]
name = "render_frame"
harness = false

[profile.release]
strip = "symbols"
