name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    # Cross-platform matrix: Linux is primary, macOS / Windows are
    # smoke-tested every push so OS-specific regressions surface
    # before release. `fail-fast: false` so a single OS failure does
    # not mask the others' status.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          # `runner.os` keeps each OS's cache isolated — Linux,
          # macOS, Windows binaries are not interchangeable.
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      # All four steps need --all / --workspace explicitly: the
      # workspace's `default-members = ["ttymap-app"]` means a bare
      # `cargo X` only acts on ttymap-app and silently skips
      # ttymap-engine (216 unit tests, every clippy lint inside the
      # engine, every rustfmt diff). CI must check both crates.
      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace --all-targets

      - name: Test
        run: cargo test --workspace --all-targets

  # Supply-chain checks. Linux-only — output is platform-independent,
  # so the matrix in `check` doesn't apply here.
  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check all
